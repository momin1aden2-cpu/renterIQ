name = "renteriq"
compatibility_date = "2024-03-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[env.production]
name = "renteriq"

[[env.production.routes]]
pattern = "renteriq.com.au"
custom_domain = true

[[env.production.routes]]
pattern = "www.renteriq.com.au"
custom_domain = true

<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="256" y1="32" x2="256" y2="492" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E6BF0"/>
      <stop offset="100%" stop-color="#0A2460"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="280" y1="280" x2="380" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E6A8"/>
      <stop offset="100%" stop-color="#00A870"/>
    </linearGradient>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield — refined crest shape -->
  <path d="M 256 32 L 448 72 Q 452 72 452 76 L 452 240 C 452 340 380 420 256 492 C 132 420 60 340 60 240 L 60 76 Q 60 72 64 72 Z" fill="url(#shieldGrad)"/>

  <!-- Subtle inner border for depth -->
  <path d="M 256 56 L 428 90 L 428 244 C 428 332 364 404 256 468 C 148 404 84 332 84 244 L 84 90 Z" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="2"/>

  <!-- House — clean geometric form -->
  <g filter="url(#innerGlow)">
    <!-- Roof -->
    <path d="M 256 130 L 148 222 L 172 222 L 172 340 L 254 340 L 254 270 L 290 270 L 290 340 L 340 340 L 340 222 L 364 222 Z" fill="white"/>
    <!-- Door -->
    <rect x="254" y="270" width="36" height="70" rx="2" fill="#1B50C8" fill-opacity="0.25"/>
    <!-- Window left -->
    <rect x="190" y="240" width="42" height="36" rx="4" fill="#1B50C8" fill-opacity="0.18"/>
    <!-- Window right grid -->
    <rect x="306" y="240" width="18" height="36" rx="3" fill="#1B50C8" fill-opacity="0.18"/>
  </g>

  <!-- Checkmark badge — bottom right -->
  <circle cx="380" cy="390" r="56" fill="url(#checkGrad)"/>
  <circle cx="380" cy="390" r="52" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.3"/>
  <path d="M 355 390 L 372 407 L 408 368" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RenterIQ — Generate PWA Icons</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #F4F7FF;
    color: #0F1C3F;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 32px;
  }
  h1 { font-size: 24px; font-weight: 800; }
  p { color: #5A6B8A; font-size: 14px; max-width: 480px; text-align: center; line-height: 1.6; }
  .icon-row {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .icon-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .icon-box canvas {
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(27,80,200,.15);
  }
  .icon-box span {
    font-size: 13px;
    font-weight: 700;
    color: #5A6B8A;
  }
  button {
    background: #1B50C8;
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }
  button:hover { background: #0A2460; }
  .note {
    background: rgba(245,166,35,.08);
    border: 1px solid rgba(245,166,35,.2);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 12px;
    color: #8A6500;
    max-width: 480px;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h1>RenterIQ PWA Icon Generator</h1>
<p>Renders the Concept A shield logo as PNG icons. Right-click and save, or use the download buttons.</p>

<div class="icon-row">
  <div class="icon-box">
    <canvas id="icon192" width="192" height="192"></canvas>
    <span>icon-192.png (192x192)</span>
    <button onclick="download('icon192', 'icon-192.png')">Download 192</button>
  </div>
  <div class="icon-box">
    <canvas id="icon512" width="512" height="512"></canvas>
    <span>icon-512.png (512x512)</span>
    <button onclick="download('icon512', 'icon-512.png')">Download 512</button>
  </div>
</div>

<div class="note">
  Save both files to <strong>/public/assets/icons/</strong> replacing the existing placeholders.
</div>

<script>
function drawIcon(canvasId) {
  var canvas = document.getElementById(canvasId);
  var s = canvas.width;

  var img = new Image();
  img.onload = function() {
    var ctx = canvas.getContext('2d');

    // Draw rounded-rect clipping mask for PWA icon shape
    var r = s * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(s - r, 0);
    ctx.quadraticCurveTo(s, 0, s, r);
    ctx.lineTo(s, s - r);
    ctx.quadraticCurveTo(s, s, s - r, s);
    ctx.lineTo(r, s);
    ctx.quadraticCurveTo(0, s, 0, s - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();

    // Fill background with brand blue
    ctx.fillStyle = '#0A2460';
    ctx.fill();
    ctx.clip();

    // Draw the SVG logo centered with padding
    var pad = s * 0.08;
    ctx.drawImage(img, pad, pad, s - pad * 2, s - pad * 2);
  };
  img.src = '/assets/logo.svg';
}

function download(canvasId, filename) {
  var canvas = document.getElementById(canvasId);
  var link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

drawIcon('icon192');
drawIcon('icon512');
</script>
</body>
</html>

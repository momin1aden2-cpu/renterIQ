<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B50C8">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="/app/css/app.css">
<script src="/app/js/searchService.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Smart Search Hub — RenterIQ</title>
<style>
.app-shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--blue-xl)}
.app-header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--blue) 0%,#1545B0 100%);padding:14px 20px;box-shadow:0 2px 16px rgba(10,36,96,.18);display:flex;align-items:center;justify-content:space-between}
.app-header h1{font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#fff}
.back-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:8px;margin:-8px}
.icon-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px;margin:-8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.icon-btn:hover{background:rgba(255,255,255,0.1)}

.search-hub{padding:20px;flex:1}
.sh-title{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:var(--text);margin-bottom:8px}
.sh-subtitle{color:var(--muted);font-size:14px;margin-bottom:24px}

.search-form{background:#fff;border-radius:16px;padding:20px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.form-group input{width:100%;padding:14px 16px;border:1.5px solid var(--border-lt);border-radius:12px;font-size:15px;font-family:'Nunito',sans-serif;background:#fff;transition:border-color 0.2s}
.form-group input:focus{border-color:var(--blue);outline:none}

.generate-btn{width:100%;background:var(--blue);color:#fff;font-family:'Sora',sans-serif;font-weight:700;font-size:15px;padding:14px;border-radius:12px;border:none;cursor:pointer;transition:all 0.2s}
.generate-btn:hover{background:var(--blue-md);transform:translateY(-1px)}
.generate-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

.providers-section{margin-top:24px}
.providers-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.providers-title::before{content:'';width:4px;height:20px;background:var(--blue);border-radius:2px}

.provider-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all 0.2s;border:1px solid var(--border-lt);position:relative;overflow:hidden}
.provider-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.1);border-color:var(--blue-lt)}
.provider-card:active{transform:scale(0.98)}
.provider-card::after{content:'›';position:absolute;right:16px;font-size:24px;color:var(--muted)}

.provider-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.provider-info{flex:1;padding-right:24px}
.provider-name{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:var(--text);margin-bottom:4px}
.provider-desc{font-size:13px;color:var(--muted);line-height:1.4}

.empty-state{text-align:center;padding:40px 20px}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-text{color:var(--muted);font-size:14px}

.loading{display:none;text-align:center;padding:40px 20px}
.loading.show{display:block}
.spinner{width:40px;height:40px;border:3px solid var(--border-lt);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

.tracked-btn{display:block;text-align:center;margin:24px 0;padding:16px;background:var(--teal-lt);border-radius:12px;color:var(--teal-dk);font-family:'Sora',sans-serif;font-weight:700;font-size:14px;text-decoration:none;transition:all 0.2s}
.tracked-btn:hover{background:var(--teal);color:#fff}
.badge{display:inline-block;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px;margin-left:8px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border-lt);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;background:none;border:none;cursor:pointer;transition:all 0.2s}
.nav-tab.active .tab-icon{background:var(--blue);color:#fff}
.nav-tab.active .tab-label{color:var(--blue);font-weight:700}
.tab-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.2s}
.tab-label{font-size:11px;font-family:'Sora',sans-serif;color:var(--muted);transition:all 0.2s}
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>Smart Search</h1>
    <button class="icon-btn" onclick="showHelp()">?</button>
  </header>

  <main class="search-hub">
    <h1 class="sh-title">Find Your Rental</h1>
    <p class="sh-subtitle">Search across all major property sites</p>

    <form class="search-form" id="searchForm" onsubmit="generateProviders(event)">
      <div class="form-group">
        <label for="suburb">Suburb</label>
        <input type="text" id="suburb" placeholder="e.g. Subiaco" required>
      </div>
      <div class="form-group">
        <label for="postcode">Postcode</label>
        <input type="text" id="postcode" placeholder="e.g. 6008" required pattern="[0-9]{4}" maxlength="4">
      </div>
      <button type="submit" class="generate-btn" id="generateBtn">🔍 Generate Search Links</button>
    </form>

    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Generating links...</p>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🏠</div>
      <div class="empty-title">Ready to Search</div>
      <p class="empty-text">Enter a suburb and postcode to generate search links for all major property sites.</p>
    </div>

    <div class="providers-section" id="providersSection" style="display:none">
      <h2 class="providers-title">Browse on</h2>
      <div id="providersList"></div>
    </div>

    <a href="./tracked.html" class="tracked-btn">
      📋 View Tracked Properties <span id="trackedBadge" class="badge" style="display:none">0</span>
    </a>
  </main>

  <nav class="bottom-nav">
    <button class="nav-tab" onclick="goTo('/app')">
      <div class="tab-icon">🏠</div>
      <span class="tab-label">Home</span>
    </button>
    <button class="nav-tab active">
      <div class="tab-icon">🔍</div>
      <span class="tab-label">Search</span>
    </button>
    <button class="nav-tab" onclick="goTo('./inspection.html')">
      <div class="tab-icon">📋</div>
      <span class="tab-label">Inspect</span>
    </button>
    <button class="nav-tab" onclick="goTo('./vault.html')">
      <div class="tab-icon">🗂️</div>
      <span class="tab-label">Vault</span>
    </button>
  </nav>
</div>

<script>
function goTo(path) {
  window.location.href = path;
}

function showHelp() {
  alert('Smart Search Hub\n\n1. Enter your suburb and WA postcode\n2. Tap "Generate Search Links"\n3. Choose a property site to browse\n4. Sites open in new tab (iframes blocked)\n5. Copy property URL and paste to track');
}

async function generateProviders(e) {
  e.preventDefault();
  
  const suburb = document.getElementById('suburb').value.trim();
  const postcode = document.getElementById('postcode').value.trim();
  
  if (!suburb || !postcode || postcode.length !== 4) {
    alert('Please enter a valid suburb and 4-digit postcode');
    return;
  }
  
  // Redirect to webview browser with suburb/postcode
  const params = new URLSearchParams({
    suburb: suburb,
    postcode: postcode
  });
  
  window.location.href = `./webview.html?${params.toString()}`;
}

function updateBadge() {
  const props = SearchService.getTrackedProperties();
  const badge = document.getElementById('trackedBadge');
  if (props.length > 0) {
    badge.textContent = props.length;
    badge.style.display = 'inline-block';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  updateBadge();
  
  // Check for URL parameters from landing page
  const urlParams = new URLSearchParams(window.location.search);
  const suburbParam = urlParams.get('suburb');
  const postcodeParam = urlParams.get('postcode');
  
  if (suburbParam) {
    document.getElementById('suburb').value = suburbParam;
  }
  if (postcodeParam) {
    document.getElementById('postcode').value = postcodeParam;
    // Auto-generate if both values present
    if (suburbParam && postcodeParam) {
      setTimeout(() => {
        document.getElementById('searchForm').dispatchEvent(new Event('submit'));
      }, 300);
    }
  }
});
</script>
<script src="/app/js/sidebar.js"></script>
</body>
</html>

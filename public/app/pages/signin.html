<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/app/manifest.json">
<meta name="theme-color" content="#0A2460">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="RenterIQ">
<link rel="stylesheet" href="/app/css/app.css?v=5">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js" defer></script>
<script src="/api/firebase-config" defer></script>
<script src="/app/js/firebase-init.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap"></noscript>
<title>Sign In — RenterIQ</title>
<style>
body{background:linear-gradient(180deg,#0A2460 0%,#1B50C8 50%,#2E63E0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.signin-card{width:100%;max-width:400px;background:#fff;border-radius:24px;padding:32px 26px calc(env(safe-area-inset-bottom,0px) + 32px);box-shadow:0 24px 80px rgba(0,0,0,.25)}
.signin-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--blue),var(--blue-md));display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.signin-logo svg{width:28px;height:32px}
.signin-title{font-family:'Sora',sans-serif;font-weight:800;font-size:24px;color:var(--text);text-align:center;letter-spacing:-.3px}
.signin-sub{font-family:'Nunito',sans-serif;font-weight:600;font-size:14px;color:var(--muted);text-align:center;margin-top:6px;line-height:1.55}
.signin-divider{display:flex;align-items:center;gap:14px;margin:22px 0}
.signin-divider::before,.signin-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.signin-divider span{font-family:'Sora',sans-serif;font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.signin-input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-family:'Nunito',sans-serif;font-weight:600;font-size:15px;color:var(--text);background:#fff;box-sizing:border-box;outline:none;transition:border-color .15s}
.signin-input:focus{border-color:var(--blue)}
.signin-input::placeholder{color:var(--muted)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-family:'Sora',sans-serif;font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.btn-signin{width:100%;background:linear-gradient(135deg,var(--blue),var(--blue-md));color:#fff;border:none;border-radius:14px;padding:16px;font-family:'Sora',sans-serif;font-weight:700;font-size:15px;cursor:pointer;min-height:52px;box-shadow:0 4px 16px rgba(27,80,200,.25);transition:all .15s;margin-top:6px}
.btn-signin:active{transform:scale(.98)}
.btn-signin:disabled{opacity:.5;cursor:not-allowed}
.btn-google{width:100%;background:#fff;color:var(--text);border:2px solid var(--border);border-radius:14px;padding:14px;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;cursor:pointer;min-height:50px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.btn-google:active{transform:scale(.98);background:var(--blue-xl)}
.btn-google svg{width:20px;height:20px}
.signin-toggle{text-align:center;margin-top:18px;font-family:'Nunito',sans-serif;font-weight:600;font-size:13px;color:var(--muted)}
.signin-toggle a{color:var(--blue);cursor:pointer;font-weight:700;text-decoration:none}
.signin-error{background:rgba(232,64,64,.08);border:1px solid rgba(232,64,64,.25);border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-weight:600;font-size:13px;color:var(--red);display:none;margin-bottom:14px;line-height:1.5}
.signin-footer{text-align:center;margin-top:20px;font-family:'Nunito',sans-serif;font-weight:600;font-size:11px;color:var(--muted);line-height:1.6}
.signin-footer a{color:var(--blue);text-decoration:none}
.forgot-link{display:block;text-align:right;margin-top:6px;font-family:'Sora',sans-serif;font-weight:700;font-size:11px;color:var(--blue);cursor:pointer;text-decoration:none}
</style>
</head>
<body>

<div class="signin-card">
  <div class="signin-logo">
    <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 256 32 L 448 72 Q 452 72 452 76 L 452 240 C 452 340 380 420 256 492 C 132 420 60 340 60 240 L 60 76 Q 60 72 64 72 Z" fill="rgba(255,255,255,.90)"/>
      <path d="M 256 130 L 148 222 L 172 222 L 172 340 L 254 340 L 254 270 L 290 270 L 290 340 L 340 340 L 340 222 L 364 222 Z" fill="#1B50C8"/>
      <rect x="254" y="270" width="36" height="70" rx="2" fill="#1B50C8" fill-opacity="0.5"/>
      <circle cx="380" cy="390" r="56" fill="#00C896"/>
      <path d="M 355 390 L 372 407 L 408 368" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>

  <div class="signin-title">Welcome to RenterIQ</div>
  <div class="signin-sub">Sign in to protect your rental journey across every device.</div>

  <!-- Google sign-in -->
  <div style="margin-top:24px">
    <button class="btn-google" id="googleBtn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="signin-divider"><span>or</span></div>

  <!-- Email/password form -->
  <div id="signinError" class="signin-error"></div>

  <form id="signinForm" onsubmit="return handleEmailSignIn(event)">
    <div class="form-group">
      <label for="signinEmail">Email</label>
      <input type="email" id="signinEmail" class="signin-input" placeholder="Your email" required autocomplete="email">
    </div>

    <div class="form-group" id="passwordGroup">
      <label for="signinPassword">Password</label>
      <input type="password" id="signinPassword" class="signin-input" placeholder="Your password" required autocomplete="current-password" minlength="6">
      <a class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
    </div>

    <div class="form-group" id="nameGroup" style="display:none">
      <label for="signinName">Your name</label>
      <input type="text" id="signinName" class="signin-input" placeholder="e.g. Sarah" autocomplete="given-name">
    </div>

    <button type="submit" class="btn-signin" id="submitBtn">Sign In</button>
  </form>

  <div class="signin-toggle" id="toggleMode">
    Don't have an account? <a onclick="toggleSignUp()">Sign up free</a>
  </div>

  <div class="signin-footer">
    By signing in you agree to our<br>
    <a href="/terms.html" target="_blank">Terms</a> · <a href="/privacy.html" target="_blank">Privacy</a> · <a href="/disclaimer.html" target="_blank">Disclaimer</a>
  </div>
</div>

<script>
var isSignUp = false;

function showError(msg) {
  var el = document.getElementById('signinError');
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function setLoading(loading) {
  var btn = document.getElementById('submitBtn');
  var gBtn = document.getElementById('googleBtn');
  if (btn) { btn.disabled = loading; btn.textContent = loading ? (isSignUp ? 'Creating account…' : 'Signing in…') : (isSignUp ? 'Create Account' : 'Sign In'); }
  if (gBtn) gBtn.disabled = loading;
}

function toggleSignUp() {
  isSignUp = !isSignUp;
  var toggle = document.getElementById('toggleMode');
  var nameGroup = document.getElementById('nameGroup');
  var btn = document.getElementById('submitBtn');
  var passInput = document.getElementById('signinPassword');

  if (isSignUp) {
    if (toggle) toggle.innerHTML = 'Already have an account? <a onclick="toggleSignUp()">Sign in</a>';
    if (nameGroup) nameGroup.style.display = 'block';
    if (btn) btn.textContent = 'Create Account';
    if (passInput) { passInput.placeholder = 'Create a password (6+ chars)'; passInput.autocomplete = 'new-password'; }
  } else {
    if (toggle) toggle.innerHTML = 'Don\'t have an account? <a onclick="toggleSignUp()">Sign up free</a>';
    if (nameGroup) nameGroup.style.display = 'none';
    if (btn) btn.textContent = 'Sign In';
    if (passInput) { passInput.placeholder = 'Your password'; passInput.autocomplete = 'current-password'; }
  }
  showError('');
}

function waitForFirebase(cb, retries) {
  retries = retries || 0;
  if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0) { cb(); return; }
  if (typeof firebase !== 'undefined' && window.__FIREBASE_CONFIG__) {
    try { firebase.initializeApp(window.__FIREBASE_CONFIG__); cb(); return; } catch (e) {}
  }
  if (retries > 30) { showError('Could not connect. Please refresh and try again.'); return; }
  setTimeout(function() { waitForFirebase(cb, retries + 1); }, 200);
}

function goToApp() {
  window.location.replace('/app/index.html');
}

function handleEmailSignIn(e) {
  e.preventDefault();
  showError('');
  var email = document.getElementById('signinEmail').value.trim();
  var password = document.getElementById('signinPassword').value;
  var name = document.getElementById('signinName') ? document.getElementById('signinName').value.trim() : '';

  if (!email || !password) { showError('Please enter your email and password.'); return false; }
  if (password.length < 6) { showError('Password must be at least 6 characters.'); return false; }

  setLoading(true);

  waitForFirebase(function() {
    var auth = firebase.auth();

    if (isSignUp) {
      auth.createUserWithEmailAndPassword(email, password).then(function(cred) {
        if (name && cred.user) {
          cred.user.updateProfile({ displayName: name });
          try {
            localStorage.setItem('riq-user-name', name);
            localStorage.setItem('riq-user-initials', name.charAt(0).toUpperCase());
          } catch (e) {}
        }
        goToApp();
      }).catch(function(err) {
        setLoading(false);
        showError(friendlyError(err.code, err.message));
      });
    } else {
      auth.signInWithEmailAndPassword(email, password).then(function() {
        goToApp();
      }).catch(function(err) {
        setLoading(false);
        showError(friendlyError(err.code, err.message));
      });
    }
  });

  return false;
}

function signInWithGoogle() {
  showError('');
  setLoading(true);

  waitForFirebase(function() {
    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).then(function(result) {
      var user = result.user;
      if (user && user.displayName) {
        try {
          localStorage.setItem('riq-user-name', user.displayName);
          localStorage.setItem('riq-user-initials', user.displayName.charAt(0).toUpperCase());
        } catch (e) {}
      }
      goToApp();
    }).catch(function(err) {
      setLoading(false);
      if (err.code === 'auth/popup-closed-by-user') return; // user cancelled — not an error
      showError(friendlyError(err.code, err.message));
    });
  });
}

function forgotPassword() {
  var email = document.getElementById('signinEmail').value.trim();
  if (!email) { showError('Enter your email above, then tap "Forgot password?"'); return; }

  waitForFirebase(function() {
    firebase.auth().sendPasswordResetEmail(email).then(function() {
      showError('');
      alert('Password reset email sent to ' + email + '. Check your inbox.');
    }).catch(function(err) {
      showError(friendlyError(err.code, err.message));
    });
  });
}

function friendlyError(code, fallback) {
  var map = {
    'auth/user-not-found': 'No account found with that email. Tap "Sign up free" to create one.',
    'auth/wrong-password': 'Incorrect password. Tap "Forgot password?" to reset it.',
    'auth/email-already-in-use': 'An account with that email already exists. Try signing in instead.',
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/weak-password': 'Password must be at least 6 characters.',
    'auth/too-many-requests': 'Too many attempts. Please wait a moment and try again.',
    'auth/network-request-failed': 'Network error — check your connection and try again.',
    'auth/popup-blocked': 'Pop-up blocked by your browser. Allow pop-ups for this site and try again.',
    'auth/operation-not-allowed': 'This sign-in method is not enabled. Contact support.',
    'auth/invalid-credential': 'Incorrect email or password. Check and try again.'
  };
  return map[code] || fallback || 'Something went wrong. Please try again.';
}

// If user is already signed in (came here by mistake), redirect to app
document.addEventListener('DOMContentLoaded', function() {
  waitForFirebase(function() {
    firebase.auth().onAuthStateChanged(function(user) {
      if (user) goToApp();
    });
  });
});
</script>

</body>
</html>

<title>Tracked Properties — RenterIQ</title>
<script src="/app/js/pwa-init.js" defer></script>
<style>
.app-header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--blue) 0%,#1545B0 100%);padding:14px 20px;box-shadow:0 2px 16px rgba(10,36,96,.18);display:flex;align-items:center;justify-content:space-between}
.app-header h1{font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#fff}
.back-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:8px;margin:-8px}
.icon-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px;margin:-8px}

.tracked-content{padding:20px;flex:1;padding-bottom:100px}
.tracked-header{margin-bottom:24px}
.tracked-title{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:var(--text);margin-bottom:8px}
.tracked-subtitle{color:var(--muted);font-size:14px}
.tracked-count{background:var(--blue);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:100px;margin-left:8px}

.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:64px;margin-bottom:20px}
.empty-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-text{color:var(--muted);font-size:14px;margin-bottom:24px;max-width:280px;margin-left:auto;margin-right:auto}
.empty-btn{background:var(--blue);color:#fff;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;padding:14px 28px;border-radius:12px;border:none;cursor:pointer;text-decoration:none;display:inline-block}

.property-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);position:relative}
.property-image{width:100%;height:180px;border-radius:12px;object-fit:cover;background:var(--blue-xl);margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:48px}
.property-image img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.property-source{position:absolute;top:24px;left:24px;background:rgba(0,0,0,0.7);color:#fff;font-size:11px;font-weight:700;padding:6px 12px;border-radius:100px;text-transform:uppercase}
.property-price{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;color:var(--blue);margin-bottom:8px}
.property-address{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.4}
.property-description{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;box-orient:vertical;overflow:hidden}

.property-actions{display:flex;gap:8px}
.property-btn{flex:1;padding:12px;border-radius:10px;font-family:'Sora',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-md)}
.btn-secondary{background:var(--blue-xl);color:var(--blue)}
.btn-secondary:hover{background:var(--blue-lt)}
.btn-danger{background:#FEE2E2;color:#DC2626}
.btn-danger:hover{background:#FECACA}

.status-badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;margin-bottom:12px}
.status-pending{background:#FEF3C7;color:#92400E}
.status-contacted{background:#DBEAFE;color:#1E40AF}
.status-inspected{background:#D1FAE5;color:#065F46}
.status-applied{background:#C7D2FE;color:#3730A3}
.status-rejected{background:#FEE2E2;color:#991B1B}

.status-selector{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.status-option{font-size:12px;padding:8px 14px;border-radius:100px;border:1px solid var(--border-lt);background:#fff;cursor:pointer;transition:all 0.2s;font-weight:600;color:var(--muted)}
.status-option:hover{border-color:var(--blue);color:var(--blue)}
.status-option.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.delete-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#DC2626;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.delete-btn:hover{background:#FEE2E2}

.import-section{background:#fff;border-radius:16px;padding:20px;margin-bottom:24px}
.import-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px}
.import-form{display:flex;gap:8px}
.import-input{flex:1;padding:12px 16px;border:1.5px solid var(--border-lt);border-radius:10px;font-size:14px;font-family:'Nunito',sans-serif}
.import-input:focus{border-color:var(--blue);outline:none}
.import-btn{background:var(--teal);color:#fff;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;padding:12px 20px;border-radius:10px;border:none;cursor:pointer}
.import-btn:hover{background:var(--teal-dk)}

/* Bottom Nav styles are global — defined in /app/css/app.css */
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>Tracked Properties</h1>
    <button class="icon-btn" onclick="showHelp()">?</button>
  </header>

  <main class="tracked-content">
    <div class="tracked-header">
      <div class="tracked-title">
        My Properties
        <span class="tracked-count" id="propertyCount" style="display:none">0</span>
      </div>
      <p class="tracked-subtitle">Properties you're tracking from your search</p>
    </div>

    <div class="import-section">
      <div class="import-title">🔗 Import from URL</div>
      <form class="import-form" onsubmit="importFromUrl(event)">
        <input type="url" class="import-input" id="importUrl" placeholder="Paste property listing URL..." required>
        <button type="submit" class="import-btn">Import</button>
      </form>
    </div>

    <div id="propertiesList"></div>

    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">🏠</div>
      <div class="empty-title">No properties yet</div>
      <p class="empty-text">Start searching and tracking properties to see them here.</p>
      <a href="/app/index.html" class="empty-btn">Start Searching</a>
    </div>
  </main>

  
</div>

<script>
const STATUS_OPTIONS = [
  { value: 'pending', label: 'Pending', class: 'status-pending' },
  { value: 'contacted', label: 'Contacted', class: 'status-contacted' },
  { value: 'inspected', label: 'Inspected', class: 'status-inspected' },
  { value: 'applied', label: 'Applied', class: 'status-applied' },
  { value: 'rejected', label: 'Rejected', class: 'status-rejected' }
];

function navigate(p){document.body.style.transition='opacity .12s ease';document.body.style.opacity='0';setTimeout(function(){window.location.href=p},100)}
function goTo(path) { window.location.href = path; }

function showHelp() {
  alert('Tracked Properties Help:\n\n• View all properties you\'ve saved\n• Update status as you progress\n• Import properties from any URL\n• Click View to open original listing\n• Click Delete to remove a property');
}

function renderProperties() {
  const properties = SearchService.getTrackedProperties();
  const list = document.getElementById('propertiesList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('propertyCount');
  
  // Update count
  if (properties.length > 0) {
    count.textContent = properties.length;
    count.style.display = 'inline-block';
    empty.style.display = 'none';
  } else {
    count.style.display = 'none';
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  
  // Sort by date, newest first
  const sorted = properties.sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));
  
  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  const safeUrl = (u) => {
    if (!u) return '';
    try {
      const parsed = new URL(u, window.location.origin);
      return (parsed.protocol === 'http:' || parsed.protocol === 'https:') ? parsed.href : '';
    } catch (e) { return ''; }
  };

  list.innerHTML = sorted.map(prop => {
    const addr    = prop.address    || prop.label   || 'Property Listing';
    const imgUrl  = safeUrl(prop.imageUrl || prop.image || '');
    const srcSite = prop.sourceSite || prop.source  || 'unknown';
    const link    = safeUrl(prop.originalLink || prop.url || '');

    const status = STATUS_OPTIONS.find(s => s.value === prop.status) || STATUS_OPTIONS[0];
    const date = new Date(prop.savedAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });

    return `
      <div class="property-card" data-id="${esc(prop.id)}">
        <button class="delete-btn" data-action="delete" data-id="${esc(prop.id)}">🗑️</button>

        <div class="property-source">${esc(SearchService.getSourceName(srcSite))}</div>

        <div class="property-image">
          ${imgUrl ? `<img src="${esc(imgUrl)}" alt="${esc(addr)}" loading="lazy" decoding="async" data-img-fallback="1">` : '🏠'}
        </div>

        <span class="status-badge ${esc(status.class)}">${esc(status.label)}</span>

        <div class="property-price">${esc(prop.price || '')}</div>
        <div class="property-address">${esc(addr)}</div>
        ${prop.description ? `<div class="property-description">${esc(prop.description)}</div>` : ''}

        <div class="status-selector">
          ${STATUS_OPTIONS.map(opt => `
            <button class="status-option ${prop.status === opt.value ? 'active' : ''}"
                    data-action="status" data-id="${esc(prop.id)}" data-value="${esc(opt.value)}">
              ${esc(opt.label)}
            </button>
          `).join('')}
        </div>

        <div class="property-actions">
          <button class="property-btn btn-primary" data-action="view" data-url="${esc(link)}" ${link ? '' : 'disabled'}>View Listing</button>
          <button class="property-btn btn-secondary" data-action="share" data-addr="${esc(addr)}" data-url="${esc(link)}">Share</button>
        </div>

        <div style="margin-top:12px;font-size:11px;color:var(--muted)">Tracked on ${esc(date)}</div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('img[data-img-fallback]').forEach(img => {
    img.addEventListener('error', function(){ this.style.display='none'; if(this.parentElement) this.parentElement.textContent='🏠'; });
  });
}

(function attachTrackedDelegation(){
  const list = document.getElementById('propertiesList');
  if (!list || list._delegated) return;
  list._delegated = true;
  list.addEventListener('click', function(e){
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    if (action === 'delete') { deleteProperty(btn.dataset.id); }
    else if (action === 'status') { updateStatus(btn.dataset.id, btn.dataset.value); }
    else if (action === 'view') { if (btn.dataset.url) viewProperty(btn.dataset.url); }
    else if (action === 'share') { shareProperty(btn.dataset.addr || '', btn.dataset.url || ''); }
  });
})();

function updateStatus(id, status) {
  SearchService.updatePropertyStatus(id, status);
  renderProperties();
}

function deleteProperty(id) {
  if (confirm('Delete this property from your tracked list?')) {
    SearchService.deleteProperty(id);
    renderProperties();
  }
}

function viewProperty(url) {
  window.open(url, '_blank');
}

function shareProperty(address, url) {
  if (navigator.share) {
    navigator.share({
      title: address,
      text: `Check out this property: ${address}`,
      url: url
    });
  } else {
    // Copy to clipboard
    navigator.clipboard.writeText(url).then(() => {
      alert('Link copied to clipboard!');
    });
  }
}

async function importFromUrl(e) {
  e.preventDefault();
  
  const url = document.getElementById('importUrl').value.trim();
  if (!url) return;
  
  const btn = e.target.querySelector('.import-btn');
  btn.textContent = 'Importing...';
  btn.disabled = true;
  
  try {
    const metadata = await SearchService.extractPropertyMetadata(url);
    
    const property = {
      id: SearchService.generateId(),
      url, originalLink: url,
      address: metadata.address, label: metadata.address,
      price: metadata.price || '',
      description: metadata.description || '',
      image: metadata.imageUrl || '', imageUrl: metadata.imageUrl || '',
      source: metadata.source, sourceSite: metadata.source,
      savedAt: new Date().toISOString(),
      status: 'tracked',
      inspectionDate: '', inspectionTime: ''
    };
    
    SearchService.saveProperty(property);
    renderProperties();
    
    document.getElementById('importUrl').value = '';
    alert('Property imported successfully!');
    
  } catch (error) {
    console.error('Import error:', error);
    alert('Failed to import property. Please check the URL and try again.');
  } finally {
    btn.textContent = 'Import';
    btn.disabled = false;
  }
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  renderProperties();
  // Pull any cloud-synced properties from other devices
  if (window.SearchService && SearchService.pullFromCloud) {
    SearchService.pullFromCloud(function() { renderProperties(); });
  }
});
</script>

  <button class="nav-tab" onclick="navigate('/app/pages/vault.html')"><div class="tab-icon">🗄️</div><span class="tab-label">Vault</span></button>
  <button class="nav-tab" onclick="navigate('/app/pages/tools.html')"><div class="tab-icon">🛠️</div><span class="tab-label">Tools</span></button>
</nav>
</body>
